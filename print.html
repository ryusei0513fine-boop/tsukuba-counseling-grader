<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>記述模擬試験・原稿用紙</title>
  <style>
    body {
      background: #f8fafc;
      color: #1e293b;
      padding: 40px 20px;
      margin: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    .no-print-bar {
      max-width: 820px;
      margin: 0 auto 20px auto;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      padding: 15px 20px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .no-print-bar h3 {
      margin: 0;
      font-size: 14px;
      color: #334155;
    }
    .no-print-bar p {
      margin: 4px 0 0 0;
      font-size: 11px;
      color: #64748b;
    }
    .print-btn {
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
      transition: all 0.2s;
    }
    .print-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 12px rgba(99, 102, 241, 0.3);
    }
    .print-page {
      background: #ffffff;
      max-width: 820px;
      margin: 0 auto 30px auto;
      padding: 40px;
      box-sizing: border-box;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      page-break-after: always;
      break-after: page;
    }
    .print-page:last-child {
      page-break-after: avoid;
      break-after: avoid;
      margin-bottom: 0;
    }
    .print-header {
      font-size: 11px;
      color: #475569;
      border-bottom: 2px solid #000000;
      padding-bottom: 5px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
    }
    .print-title {
      font-size: 22px;
      font-weight: bold;
      color: #000000;
      margin: 0 0 25px 0;
      text-align: center;
    }
    .print-sheet-title {
      font-size: 15px;
      font-weight: bold;
      color: #000000;
      margin: 0 0 20px 0;
      padding-bottom: 5px;
      border-bottom: 1px dashed #000000;
    }
    .print-section {
      margin-bottom: 30px;
    }
    .print-section h2 {
      font-size: 14px;
      font-weight: bold;
      color: #000000;
      margin: 0 0 12px 0;
      border-left: 4px solid #000000;
      padding-left: 8px;
    }
    .p-question-box {
      border: 1px solid #000000;
      padding: 15px;
      font-size: 13px;
      line-height: 1.6;
      background: #f8fafc;
    }
    .print-charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .p-chart-card {
      border: 1px solid #000000;
      padding: 15px;
      border-radius: 4px;
      background: #fff;
    }
    .p-chart-title {
      font-size: 13px;
      font-weight: bold;
      color: #000000;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }
    .p-chart-unit {
      font-size: 11px;
      font-weight: normal;
    }
    .p-chart-bars {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .p-chart-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .p-chart-label {
      font-size: 12px;
      font-weight: bold;
      color: #000000;
    }
    .p-chart-bar-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .p-chart-bar-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .p-series-label {
      width: 100px;
      font-size: 11px;
      color: #000000;
      text-align: right;
      font-weight: bold;
    }
    .p-bar-outer {
      flex-grow: 1;
      height: 16px;
      background: #f1f5f9;
      border: 1px solid #000000;
      border-radius: 2px;
      overflow: hidden;
    }
    .p-bar-inner {
      height: 100%;
      border-radius: 0;
    }
    .p-bar-val {
      width: 45px;
      font-size: 11px;
      font-weight: bold;
      text-align: left;
    }
    .exam-header-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 30px;
      border-bottom: 2px solid #000000;
      padding-bottom: 12px;
    }
    .exam-title-sub {
      font-size: 14px;
      font-weight: bold;
      color: #000000;
    }
    .candidate-box {
      display: flex;
      align-items: center;
      border: 2px solid #000000;
    }
    .candidate-label {
      font-size: 11px;
      padding: 6px 12px;
      background: #e2e8f0;
      border-right: 2px solid #000000;
      font-weight: bold;
    }
    .candidate-cells {
      display: flex;
    }
    .candidate-cell {
      width: 26px;
      height: 26px;
      border-right: 1.5px solid #000000;
    }
    .candidate-cell:last-child {
      border-right: none;
    }
    .c-grid {
      display: grid;
      grid-template-columns: repeat(20, 26px) 35px;
      grid-template-rows: repeat(15, 26px);
      gap: 0;
      border-top: 1.5px solid #000000;
      border-left: 1.5px solid #000000;
      width: fit-content;
      margin: 30px auto;
    }
    .c-cell {
      border-right: 1px solid #7f8c8d;
      border-bottom: 1px solid #7f8c8d;
      box-sizing: border-box;
    }
    .c-num {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #000000;
      font-family: 'Outfit', sans-serif;
      font-weight: bold;
    }
    @media print {
      body {
        background: #ffffff !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .no-print-bar {
        display: none !important;
      }
      .print-page {
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        page-break-after: always;
        break-after: page;
      }
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    const rawData = localStorage.getItem('print_round_data');
    if (!rawData) {
      document.getElementById('content').innerHTML = '<div class="print-page"><h2>エラー: 印刷データが見つかりませんでした。 Graderの画面からやり直してください。</h2></div>';
    } else {
      const round = JSON.parse(rawData);
      let html = '';
      
      html += '  <div class="no-print-bar">';
      html += '    <div>';
      html += '      <h3>模擬試験問題・原稿用紙（手書き用）</h3>';
      html += '      <p>右のボタンを押して、送信先を「PDFとして保存」にするか、直接プリンターで印刷してください。</p>';
      html += '    </div>';
      html += '    <button class="print-btn" onclick="window.print()">印刷 / PDFとして保存</button>';
      html += '  </div>';
      
      html += '<div class="print-page">';
      html += '  <div class="print-header">';
      html += '    <span>筑波大学大学院 人間総合科学学術院 カウンセリング学位プログラム対策</span>';
      html += `    <span>演習番号: ` + round.id + `</span>`;
      html += '  </div>';
      html += `  <h1 class="print-title">記述模擬試験・問題用紙</h1>`;
      html += `  <div style="font-size: 15px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #000; padding-bottom: 8px;">課題名：` + round.title + `</div>`;
      
      if (round.charts && round.charts.length > 0) {
        html += '  <div class="print-section">';
        html += '    <h2>【提示データ】</h2>';
        html += '    <div class="print-charts-grid">';
        
        round.charts.forEach(chart => {
          html += '    <div class="p-chart-card">';
          html += `      <div class="p-chart-title">`;
          html += `        <span>` + chart.title + `</span>`;
          html += `        <span class="p-chart-unit">（単位: ` + chart.unit + `）</span>`;
          html += `      </div>`;
          html += '      <div class="p-chart-bars">';
          
          if (chart.type === 'bar-group') {
            chart.labels.forEach((label, labelIdx) => {
              html += '    <div class="p-chart-row">';
              html += `      <div class="p-chart-label">` + label + `</div>`;
              html += '      <div class="p-chart-bar-group">';
              
              chart.series.forEach(s => {
                const val = s.data[labelIdx];
                if (val === undefined) return;
                const pct = chart.unit === '点' ? (val / 5) * 100 : val;
                
                html += '    <div class="p-chart-bar-container">';
                html += `      <span class="p-series-label">` + s.name + `</span>`;
                html += '      <div class="p-bar-outer">';
                html += `        <div class="p-bar-inner" style="width: ` + pct + `%; background-color: ` + (s.color || '#4338ca') + `"></div>`;
                html += '      </div>';
                html += `      <span class="p-bar-val">` + val + (chart.unit === '%' ? '%' : '') + `</span>`;
                html += '    </div>';
              });
              
              html += '      </div>';
              html += '    </div>';
            });
          }
          html += '      </div>';
          html += '    </div>';
        });
        html += '    </div>';
        html += '  </div>';
      }
      
      html += '  <div class="print-section">';
      html += '    <h2>【問題】</h2>';
      html += `    <div class="p-question-box">`;
      html += `      <strong>問1：</strong>` + round.q1 + `<br><br>`;
      html += `      <strong>問2：</strong>` + round.q2 + ``;
      html += `    </div>`;
      html += '  </div>';
      html += '</div>';
      
      html += '<div class="print-page">';
      html += '  <div class="exam-header-meta">';
      html += '    <div class="exam-title-sub">模擬試験 答案用紙</div>';
      html += '    <div class="candidate-box">';
      html += '      <div class="candidate-label">受験番号</div>';
      html += '      <div class="candidate-cells"><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div></div>';
      html += '    </div>';
      html += '  </div>';
      html += `  <div class="print-sheet-title">記述模擬試験（` + round.title + `）➔ 問1 解答欄（300字以内）</div>`;
      html += '  <div class="print-grid-container">';
      html += '    <div class="c-grid">';
      for (let row = 0; row < 15; row++) {
        for (let col = 0; col < 20; col++) {
          html += '    <div class="c-cell"></div>';
        }
        html += `    <div class="c-num">` + ((row + 1) * 20) + `</div>`;
      }
      html += '    </div>';
      html += '  </div>';
      html += '</div>';
      
      html += '<div class="print-page">';
      html += '  <div class="exam-header-meta">';
      html += '    <div class="exam-title-sub">模擬試験 答案用紙</div>';
      html += '    <div class="candidate-box">';
      html += '      <div class="candidate-label">受験番号</div>';
      html += '      <div class="candidate-cells"><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div></div>';
      html += '    </div>';
      html += '  </div>';
      html += `  <div class="print-sheet-title">記述模擬試験（` + round.title + `）➔ 問2 解答欄（300字以内）</div>`;
      html += '  <div class="print-grid-container">';
      html += '    <div class="c-grid">';
      for (let row = 0; row < 15; row++) {
        for (let col = 0; col < 20; col++) {
          html += '    <div class="c-cell"></div>';
        }
        html += `    <div class="c-num">` + ((row + 1) * 20) + `</div>`;
      }
      html += '    </div>';
      html += '  </div>';
      html += '</div>';
      
      document.getElementById('content').innerHTML = html;
    }
  </script>
</body>
</html>
