<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>記述模擬試験・問題用紙 / 答案用紙</title>
  <style>
    :root {
      --academic-blue: #4f81bd;
      --academic-red: #c0504d;
      --academic-green: #9bbb59;
      --academic-purple: #8064a2;
      --academic-gray: #7f7f7f;
    }
    body {
      background: #f1f5f9; /* Screen background */
      color: #000000;
      padding: 40px 20px;
      margin: 0;
      font-family: 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', 'MS Mincho', Georgia, serif;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    .no-print-bar {
      max-width: 820px;
      margin: 0 auto 20px auto;
      background: #ffffff;
      border: 1px solid #000000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }
    .no-print-bar h3 {
      margin: 0;
      font-size: 14px;
      color: #334155;
    }
    .no-print-bar p {
      margin: 4px 0 0 0;
      font-size: 11px;
      color: #64748b;
    }
    .print-btn {
      background: #000000;
      color: #ffffff;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #000000;
      cursor: pointer;
      transition: all 0.2s;
    }
    .print-btn:hover {
      background: #333333;
    }
    .print-page {
      background: #ffffff;
      max-width: 820px;
      margin: 0 auto 30px auto;
      padding: 50px 60px;
      box-sizing: border-box;
      border: 1px solid #000000;
      page-break-after: always;
      break-after: page;
      position: relative;
    }
    .print-page:last-child {
      page-break-after: avoid;
      break-after: avoid;
      margin-bottom: 0;
    }
    .print-header {
      font-size: 12px;
      font-weight: bold;
      color: #000000;
      border-bottom: 3px double #000000;
      padding-bottom: 6px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
    }
    .print-title {
      font-size: 24px;
      font-weight: bold;
      color: #000000;
      margin: 0 0 35px 0;
      text-align: center;
      letter-spacing: 2px;
    }
    .print-sheet-title {
      font-size: 15px;
      font-weight: bold;
      color: #000000;
      margin: 0 0 20px 0;
      padding-bottom: 6px;
      border-bottom: 2px solid #000000;
    }
    .print-section {
      margin-bottom: 30px;
    }
    .print-section h2 {
      font-size: 15px;
      font-weight: bold;
      color: #000000;
      margin: 0 0 15px 0;
      border-left: 5px solid #000000;
      padding-left: 10px;
    }
    .p-question-box {
      border: 3px double #000000;
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      background: #ffffff;
    }
    .print-charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }
    .p-chart-card {
      border: 1px solid #000000;
      padding: 20px;
      background: #ffffff;
      font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', Meiryo, sans-serif;
    }
    .p-chart-title {
      font-size: 13px;
      font-weight: bold;
      color: #000000;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1.5px solid #000000;
      padding-bottom: 5px;
    }
    .p-chart-unit {
      font-size: 11px;
      font-weight: normal;
    }
    .p-chart-bars {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .p-chart-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .p-chart-label {
      width: 110px;
      font-size: 12px;
      font-weight: bold;
      color: #000000;
      text-align: left;
      padding-top: 2px;
    }
    .p-chart-bar-group {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-left: 1.5px solid #000000;
      padding-left: 10px;
    }
    .p-chart-bar-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .p-series-label {
      width: 65px;
      font-size: 11px;
      color: #000000;
      text-align: right;
    }
    .p-bar-outer {
      flex-grow: 1;
      height: 18px;
      background: #ffffff;
      border: 1px solid #000000;
      position: relative;
    }
    .p-bar-inner {
      height: 100%;
      border-right: 1px solid #000000;
    }
    .p-bar-val {
      width: 45px;
      font-size: 11px;
      font-weight: bold;
      text-align: left;
      color: #000000;
    }
    .exam-header-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 30px;
      border-bottom: 2px solid #000000;
      padding-bottom: 12px;
    }
    .exam-title-sub {
      font-size: 14px;
      font-weight: bold;
      color: #000000;
    }
    .candidate-box {
      display: flex;
      align-items: center;
      border: 2px solid #000000;
    }
    .candidate-label {
      font-size: 11px;
      padding: 6px 12px;
      background: #ffffff;
      border-right: 2px solid #000000;
      font-weight: bold;
    }
    .candidate-cells {
      display: flex;
    }
    .candidate-cell {
      width: 26px;
      height: 26px;
      border-right: 1.5px solid #000000;
      background: #ffffff;
    }
    .candidate-cell:last-child {
      border-right: none;
    }
    .c-grid {
      display: grid;
      grid-template-columns: repeat(20, 26px) 35px;
      grid-template-rows: repeat(15, 26px);
      gap: 0;
      border-top: 1.5px solid #000000;
      border-left: 1.5px solid #000000;
      width: fit-content;
      margin: 30px auto;
    }
    .c-cell {
      border-right: 1px solid #000000;
      border-bottom: 1px solid #000000;
      box-sizing: border-box;
    }
    .c-num {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #000000;
      font-family: 'Outfit', sans-serif;
      font-weight: bold;
    }
    .print-footer-notice {
      text-align: center;
      font-size: 12px;
      margin-top: 40px;
      font-weight: bold;
    }
    @media print {
      body {
        background: #ffffff !important;
        padding: 0 !important;
        margin: 0 !important;
      }
      .no-print-bar {
        display: none !important;
      }
      .print-page {
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        margin: 0 !important;
        page-break-after: always;
        break-after: page;
      }
      .p-bar-outer, .p-bar-inner {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    function getAcademicColor(sName, index) {
      const name = sName.trim();
      if (name === "男性" || name === "高い職場" || name === "設置あり" || name === "受講あり" || name === "FSSB高い上司" || name === "週1回以上参加" || name === "満足群" || name === "意向あり" || name === "選択あり") {
        return "#4f81bd"; // Classical Academic Blue
      }
      if (name === "女性" || name === "低い職場" || name === "設置なし" || name === "受講なし" || name === "FSSB低い上司" || name === "意向なし" || name === "選択なし") {
        return "#c0504d"; // Classical Academic Red/Pink
      }
      if (name === "全体" || name === "平均") {
        return "#7f7f7f"; // Classical Academic Gray
      }
      
      const colors = ["#4f81bd", "#c0504d", "#9bbb59", "#8064a2", "#4bacc6", "#f79646", "#7f7f7f"];
      return colors[index % colors.length];
    }

    const rawData = localStorage.getItem('print_round_data');
    if (!rawData) {
      document.getElementById('content').innerHTML = '<div class="print-page"><h2>エラー: 印刷データが見つかりませんでした。 Graderの画面からやり直してください。</h2></div>';
    } else {
      const round = JSON.parse(rawData);
      let html = '';
      
      // Screen Banner
      html += '  <div class="no-print-bar">';
      html += '    <div>';
      html += '      <h3>模擬試験問題・原稿用紙（手書き用）</h3>';
      html += '      <p>右のボタンを押して、送信先を「PDFとして保存」にするか、直接プリンターで印刷してください。</p>';
      html += '    </div>';
      html += '    <button class="print-btn" onclick="window.print()">印刷 / PDFとして保存</button>';
      html += '  </div>';
      
      // Page 1: Problem Paper
      html += '<div class="print-page">';
      html += '  <div class="print-header">';
      html += '    <span>筑波大学大学院 人間総合科学学術院 カウンセリング学位プログラム対策</span>';
      html += `    <span>演習番号: ` + round.id + `</span>`;
      html += '  </div>';
      html += `  <h1 class="print-title">記述模擬試験・問題用紙</h1>`;
      html += `  <div style="font-size: 15px; font-weight: bold; margin-bottom: 25px; border-bottom: 1.5px solid #000; padding-bottom: 8px; font-family: 'Yu Mincho', serif;">課題名：` + round.title + `</div>`;
      
      // Printable charts
      if (round.charts && round.charts.length > 0) {
        html += '  <div class="print-section">';
        html += '    <h2>【提示データ】</h2>';
        html += '    <div class="print-charts-grid">';
        
        round.charts.forEach(chart => {
          html += '    <div class="p-chart-card">';
          html += `      <div class="p-chart-title">`;
          html += `        <span>` + chart.title + `</span>`;
          html += `        <span class="p-chart-unit">（単位: ` + chart.unit + `）</span>`;
          html += `      </div>`;
          html += '      <div class="p-chart-bars">';
          
          if (chart.type === 'bar-group') {
            chart.labels.forEach((label, labelIdx) => {
              html += '    <div class="p-chart-row">';
              html += `      <div class="p-chart-label">` + label + `</div>`;
              html += '      <div class="p-chart-bar-group">';
              
              chart.series.forEach((s, sIdx) => {
                const val = s.data[labelIdx];
                if (val === undefined) return;
                const pct = chart.unit === '点' ? (val / 5) * 100 : val;
                const color = getAcademicColor(s.name, sIdx);
                
                html += '    <div class="p-chart-bar-container">';
                html += `      <span class="p-series-label">` + s.name + `</span>`;
                html += '      <div class="p-bar-outer">';
                html += `        <div class="p-bar-inner" style="width: ` + pct + `%; background: ` + color + `"></div>`;
                html += '      </div>';
                html += `      <span class="p-bar-val">` + val + (chart.unit === '%' ? '%' : '') + `</span>`;
                html += '    </div>';
              });
              
              html += '      </div>';
              html += '    </div>';
            });
          }
          html += '      </div>';
          html += '    </div>';
        });
        html += '    </div>';
        html += '  </div>';
      }
      
      // Question block
      html += '  <div class="print-section">';
      html += '    <h2>【問題】</h2>';
      html += `    <div class="p-question-box">`;
      html += `      <strong>問1：</strong>` + round.q1 + `<br><br>`;
      html += `      <strong>問2：</strong>` + round.q2 + ``;
      html += `    </div>`;
      html += '  </div>';
      html += '  <div class="print-footer-notice">（次ページに続く）</div>';
      html += '</div>';
      
      // Page 2: Q1 Sheet
      html += '<div class="print-page">';
      html += '  <div class="exam-header-meta">';
      html += '    <div class="exam-title-sub">模擬試験 答案用紙</div>';
      html += '    <div class="candidate-box">';
      html += '      <div class="candidate-label">受験番号</div>';
      html += '      <div class="candidate-cells"><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div></div>';
      html += '    </div>';
      html += '  </div>';
      html += `  <div class="print-sheet-title">記述模擬試験（` + round.title + `）➔ 問1 解答欄（300字以内）</div>`;
      html += '  <div class="print-grid-container">';
      html += '    <div class="c-grid">';
      for (let row = 0; row < 15; row++) {
        for (let col = 0; col < 20; col++) {
          html += '    <div class="c-cell"></div>';
        }
        html += `    <div class="c-num">` + ((row + 1) * 20) + `</div>`;
      }
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="print-footer-notice">（次ページに続く）</div>';
      html += '</div>';
      
      // Page 3: Q2 Sheet
      html += '<div class="print-page">';
      html += '  <div class="exam-header-meta">';
      html += '    <div class="exam-title-sub">模擬試験 答案用紙</div>';
      html += '    <div class="candidate-box">';
      html += '      <div class="candidate-label">受験番号</div>';
      html += '      <div class="candidate-cells"><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div><div class="candidate-cell"></div></div>';
      html += '    </div>';
      html += '  </div>';
      html += `  <div class="print-sheet-title">記述模擬試験（` + round.title + `）➔ 問2 解答欄（300字以内）</div>`;
      html += '  <div class="print-grid-container">';
      html += '    <div class="c-grid">';
      for (let row = 0; row < 15; row++) {
        for (let col = 0; col < 20; col++) {
          html += '    <div class="c-cell"></div>';
        }
        html += `    <div class="c-num">` + ((row + 1) * 20) + `</div>`;
      }
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="print-footer-notice">（以上で問題・答案は終了です）</div>';
      html += '</div>';
      
      document.getElementById('content').innerHTML = html;
    }
  </script>
</body>
</html>
